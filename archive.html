<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>Archive &middot; This Week in RWE, Causal Inference &amp; AI &middot; Black Swan Causal Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:       #050608;
    --deep:        #090c10;
    --surface:     #0d1117;
    --ink:         #111620;
    --border:      rgba(255,255,255,0.06);
    --silver:      #c8cdd4;
    --white:       #eef0f3;
    --teal:        #3d7a7a;
    --teal-light:  #5aadad;
    --accent:      #8bbfbf;
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 30px 64px;
    background: linear-gradient(to bottom, rgba(5,6,8,0.95) 0%, transparent 100%);
  }
  .nav-logo {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--silver);
    text-decoration: none;
    text-transform: uppercase;
  }
  .nav-logo span { color: var(--teal-light); }
  .nav-back {
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    transition: color 0.3s;
  }
  .nav-back:hover { color: var(--teal-light); }

  /* FADE-IN */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .reveal {
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
  }
  .reveal-d1 { animation-delay: 0.1s; }
  .reveal-d2 { animation-delay: 0.3s; }
  .reveal-d3 { animation-delay: 0.5s; }
  .reveal-d4 { animation-delay: 0.7s; }

  /* MAIN */
  .archive-wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 140px 24px 80px;
  }

  .page-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--teal-light);
    margin-bottom: 18px;
  }
  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 5.5vw, 52px);
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 18px;
  }
  .page-subtitle {
    font-size: 17px;
    color: var(--silver);
    line-height: 1.7;
    max-width: 640px;
    margin-bottom: 12px;
  }
  .archive-meta {
    font-size: 13px;
    color: rgba(200,205,212,0.5);
    letter-spacing: 0.1em;
    margin-bottom: 56px;
  }

  /* JUMP NAV */
  .jump-nav {
    position: sticky;
    top: 96px;
    background: rgba(13,17,23,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 20px;
    margin-bottom: 48px;
    z-index: 50;
  }
  .jump-nav-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--teal-light);
    margin-right: 12px;
  }
  .jump-nav-list {
    display: inline;
  }
  .jump-nav a {
    display: inline-block;
    color: var(--silver);
    text-decoration: none;
    font-size: 13px;
    margin-right: 16px;
    padding: 4px 0;
    transition: color 0.3s;
  }
  .jump-nav a:hover { color: var(--teal-light); }

  /* WEEK SECTIONS (collapsible) */
  .archive-week {
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    scroll-margin-top: 180px;
    transition: border-color 0.3s;
  }
  .archive-week.open { border-color: rgba(90,173,173,0.25); }
  .archive-week-toggle {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--white);
    cursor: pointer;
    padding: 24px 32px;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    font-family: inherit;
    transition: background 0.3s;
  }
  .archive-week-toggle:hover { background: rgba(90,173,173,0.05); }
  .archive-week-toggle-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 0;
  }
  .archive-week-header {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--white);
    line-height: 1.2;
  }
  .archive-week-count {
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(200,205,212,0.5);
  }
  .archive-week-toggle-icon {
    color: var(--teal-light);
    font-size: 22px;
    flex-shrink: 0;
    transition: transform 0.3s;
    line-height: 1;
  }
  .archive-week.open .archive-week-toggle-icon { transform: rotate(45deg); }
  .archive-week-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s ease, padding 0.3s;
  }
  .archive-week.open .archive-week-body {
    max-height: 6000px;
    padding: 0 32px 24px;
  }

  .archive-article {
    padding: 22px 0;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .archive-article:first-child { border-top: none; padding-top: 12px; }
  .archive-article-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .archive-article-source {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--teal-light);
    background: rgba(61,122,122,0.15);
    padding: 3px 9px;
    border-radius: 3px;
  }
  .archive-article-tag {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--silver);
    background: rgba(255,255,255,0.04);
    padding: 2px 7px;
    border-radius: 3px;
  }
  .archive-article-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 400;
    line-height: 1.4;
    margin-bottom: 4px;
  }
  .archive-article-title a {
    color: var(--white);
    text-decoration: none;
    transition: color 0.3s;
  }
  .archive-article-title a:hover { color: var(--teal-light); }
  .archive-article-authors {
    font-size: 12px;
    color: rgba(200,205,212,0.5);
    margin-bottom: 6px;
  }
  .archive-article-blurb {
    font-size: 13px;
    line-height: 1.65;
    color: var(--silver);
    margin-top: 8px;
  }
  .archive-article-blurb strong {
    color: var(--accent);
    font-weight: 400;
  }

  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--silver);
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 48px 64px 32px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .footer-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 24px;
  }
  .footer-copy {
    font-size: 11px;
    color: rgba(200,205,212,0.35);
    letter-spacing: 0.08em;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    nav { padding: 20px 20px; }
    .archive-wrap { padding: 110px 16px 60px; }
    .jump-nav { padding: 12px 16px; }
    footer { padding: 36px 16px 24px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Black Swan <span>Causal Labs</span></a>
  <a href="reading-list.html" class="nav-back">&larr; Back to Reading List</a>
</nav>

<main class="archive-wrap">
  <p class="page-eyebrow reveal reveal-d1">Archive</p>
  <h1 class="page-title reveal reveal-d2">Reading List Archive</h1>
  <p class="page-subtitle reveal reveal-d3">Every paper ever featured in This Week in RWE, Causal Inference &amp; AI, browsable by week.</p>
  <p class="archive-meta reveal reveal-d3" id="archive-meta"></p>

  <div id="jump-nav" class="reveal reveal-d3" style="display:none;">
    <div class="jump-nav">
      <span class="jump-nav-label">Jump to</span>
      <span class="jump-nav-list" id="jump-nav-list"></span>
    </div>
  </div>

  <div id="archive-container" class="reveal reveal-d4">
    <div class="empty-state">
      <p>The archive will populate as weekly issues are published.</p>
    </div>
  </div>
</main>

<footer>
  <div class="footer-bottom">
    <p class="footer-copy">&copy; 2026 Black Swan Causal Labs, LLC, Los Angeles, CA</p>
  </div>
</footer>

<script>
(async function() {
  try {
    const res = await fetch('articles.json');
    const data = await res.json();
    const container = document.getElementById('archive-container');
    const metaEl = document.getElementById('archive-meta');
    const jumpNavWrap = document.getElementById('jump-nav');
    const jumpNavList = document.getElementById('jump-nav-list');

    if (!data.weeks || data.weeks.length === 0) return;

    const totalArticles = data.weeks.reduce((sum, w) => sum + (w.articles?.length || 0), 0);
    metaEl.textContent = data.weeks.length + ' issues, ' + totalArticles + ' papers archived';

    container.innerHTML = '';

    // Build jump nav if there are 3 or more weeks
    if (data.weeks.length >= 3) {
      jumpNavWrap.style.display = 'block';
      data.weeks.forEach((week, i) => {
        const a = document.createElement('a');
        a.href = '#week-' + i;
        a.textContent = formatDateShort(week.weekOf);
        a.addEventListener('click', () => {
          const target = document.getElementById('week-' + i);
          if (target) target.classList.add('open');
        });
        jumpNavList.appendChild(a);
      });
    }

    data.weeks.forEach((week, i) => {
      const section = document.createElement('section');
      section.className = 'archive-week';
      section.id = 'week-' + i;
      // First (most recent) week opens by default
      if (i === 0) section.classList.add('open');

      const toggle = document.createElement('button');
      toggle.className = 'archive-week-toggle';
      toggle.type = 'button';
      toggle.innerHTML =
        '<div class="archive-week-toggle-left">' +
          '<span class="archive-week-header">Week of ' + formatDate(week.weekOf) + '</span>' +
          '<span class="archive-week-count">' + week.articles.length + ' papers</span>' +
        '</div>' +
        '<span class="archive-week-toggle-icon">+</span>';
      toggle.addEventListener('click', () => section.classList.toggle('open'));
      section.appendChild(toggle);

      const body = document.createElement('div');
      body.className = 'archive-week-body';

      week.articles.forEach(article => {
        const div = document.createElement('div');
        div.className = 'archive-article';

        const tags = (article.tags || []).map(t =>
          '<span class="archive-article-tag">' + escHtml(t) + '</span>'
        ).join('');

        const authors = article.authors
          ? '<p class="archive-article-authors">' + escHtml(article.authors) + '</p>'
          : '';

        div.innerHTML =
          '<div class="archive-article-meta">' +
            '<span class="archive-article-source">' + escHtml(article.source) + '</span>' +
            tags +
          '</div>' +
          '<p class="archive-article-title"><a href="' + escAttr(article.url) + '" target="_blank" rel="noopener">' + escHtml(article.title) + '</a></p>' +
          authors +
          '<p class="archive-article-blurb">' + article.blurb + '</p>';

        body.appendChild(div);
      });

      section.appendChild(body);
      container.appendChild(section);
    });

    // If a hash like #week-2 is in the URL, open that week and scroll to it
    if (window.location.hash) {
      const target = document.querySelector(window.location.hash);
      if (target && target.classList.contains('archive-week')) {
        target.classList.add('open');
      }
    }
  } catch (e) {
    // silent
  }

  function formatDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }
  function formatDateShort(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
  function escHtml(s) {
    const el = document.createElement('span');
    el.textContent = s;
    return el.innerHTML;
  }
  function escAttr(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
})();
</script>

</body>
</html>
